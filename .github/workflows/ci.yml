name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "skills/**"
      - "rules/**"
  pull_request:
    branches: [main]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── 格式 + 静态检查 ─────────────────────────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1.17
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (strict)
        run: cargo clippy --all-targets -- -D warnings

  # ─── 构建 + 测试 ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1.17

      - uses: Swatinem/rust-cache@v2

      - name: Build debug
        run: cargo build --tests

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Smoke test — find-how
        run: ./target/release/repo-inspect --repo . find-how "search" --depth 1

      - name: Smoke test — overview
        run: ./target/release/repo-inspect --repo . overview

  # ─── 依赖安全审计 ────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1.17

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Check advisories
        run: cargo audit

  # ─── 发布验证（仅在打 tag 时触发） ──────────────────────────────────────
  release:
    name: Release verification
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, audit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1.17

      - uses: Swatinem/rust-cache@v2

      - name: Full release build (locked)
        run: cargo build --release --locked

      - name: Check binary
        run: |
          file target/release/repo-inspect
          ./target/release/repo-inspect --version

      - name: Full test suite (locked)
        run: cargo test --locked

      - name: Binary size check
        run: |
          SIZE=$(stat --format=%s target/release/repo-inspect 2>/dev/null || stat -f%z target/release/repo-inspect)
          echo "Binary size: $SIZE bytes ($(( SIZE / 1048576 )) MB)"
          test $SIZE -lt 7000000 || echo "Warning: binary exceeds 7 MB"

      - name: Smoke tests
        run: |
          ./target/release/repo-inspect --repo . find-how "search" --depth 1
          ./target/release/repo-inspect --repo . overview
          ./target/release/repo-inspect --repo . entries
