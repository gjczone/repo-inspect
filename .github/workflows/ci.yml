name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "skills/**"]
  pull_request:
    branches: [main]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format + Lint + Build + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (strict)
        run: cargo clippy -- -D warnings

      - name: Build release
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Smoke test
        run: ./target/release/repo-inspect --repo . find-how "search" --depth 1
